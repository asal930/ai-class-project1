<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دستیار معلم هوش مصنوعی</title>

    <style>
        body {
            font-family: Tahoma, Arial;
            background: #f2f2f2;
            margin: 0;
            padding: 20px;
        }

        .box {
            background: white;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #2980b9;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1f6390;
        }

        .output {
            margin-top: 15px;
            padding: 10px;
            background: #eaf6ff;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>دستیار هوشمند معلم</h1>

    <p>موضوع درس را وارد کن تا ایده تدریس دریافت کنی</p>

    <input type="text" id="topic" placeholder="مثلاً: اسم تفضیل / نقاشی طبیعت">

    <button onclick="generateIdea()">
        تولید ایده تدریس
    </button>

    <div class="output" id="result"></div>

</div>

<script>
    function generateIdea() {
        let topic = document.getElementById("topic").value;

        if (topic === "") {
            document.getElementById("result").innerText = "لطفاً یک موضوع وارد کن.";
            return;
        }

        let ideas = [
            `برای موضوع "${topic}" از دانش‌آموزان بخواه یک مثال واقعی در زندگی روزمره پیدا کنند.`,
            `یک فعالیت گروهی طراحی کن که دانش‌آموزان درباره "${topic}" گفتگو کنند.`,
            `از دانش‌آموزان بخواه یک پوستر یا نقاشی درباره "${topic}" بسازند.`,
            `یک بازی کلاسی طراحی کن که مفهوم "${topic}" را آموزش دهد.`,
            `دانش‌آموزان یک متن کوتاه درباره "${topic}" بنویسند.`
        ];

        let random = Math.floor(Math.random() * ideas.length);

        document.getElementById("result").innerText = ideas[random];
    }
</script>

</body>
</html>
