<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
  <title>معلم هوشمند با خانم عربصالحی</title>
<link rel="stylesheet" href="style.css">


</head
<body>

<div class="box">

<h1>🎓 معلم هوشمند با خانم عربصالحی</h1>

<p>
دستیار آموزشی برای طراحی درس، فعالیت کلاسی و ایده‌های خلاقانه در عربی و هنر
</p>


<label>انتخاب درس:</label>

<select id="lesson">
<option>عربی</option>
<option>هنر</option>
</select>


<label>پایه دانش‌آموز:</label>

<select id="grade">
<option>هفتم</option>
<option>هشتم</option>
<option>نهم</option>
</select>


<label>موضوع درس:</label>

<input id="topic" placeholder="مثلاً: اسم تفضیل یا نقاشی طبیعت">


<label>نوع فعالیت:</label>

<select id="type">

<option>طرح درس</option>
<option>سؤال امتحانی</option>
<option>فعالیت گروهی</option>
<option>ایده خلاقانه</option>

</select>


<button onclick="createIdea()">
ساخت پیشنهاد آموزشی
</button>

<button onclick="copyResult()">
کپی نتیجه
</button>
  <button onclick="saveIdea()">
⭐ ذخیره ایده
  </button>
<div class="result" id="result">
نتیجه اینجا نمایش داده می‌شود.
</div>

<h2>📚 ایده‌های ذخیره شده</h2>

<div class="result" id="savedIdeas">
هنوز ایده‌ای ذخیره نشده است.
</div>
</div>



<script src="script.js"></script>


</body>
</html>
