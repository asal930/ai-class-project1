<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>د<h1>🎓 معلم هوشمند با خانم عربصالحی</h1>.</title>

<style>
body {
    font-family: Tahoma, Arial;
    background: #f3f3f3;
    padding: 20px;
}

.box {
    background: white;
    max-width: 700px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 10px #ccc;
}

h1 {
    color: #2c3e50;
}

select, input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #2980b9;
    color: white;
    cursor: pointer;
    border: none;
}

button:hover {
    background: #1f618d;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #eef8ff;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="box">

<h1>🎓 معلم هوشمند با خانم عربصالحی</h1>

<p>
دستیار آموزشی برای طراحی درس، فعالیت کلاسی و ایده‌های خلاقانه در عربی و هنر
</p>


<label>انتخاب درس:</label>

<select id="lesson">
<option>عربی</option>
<option>هنر</option>
</select>


<label>پایه دانش‌آموز:</label>

<select id="grade">
<option>هفتم</option>
<option>هشتم</option>
<option>نهم</option>
</select>


<label>موضوع درس:</label>

<input id="topic" placeholder="مثلاً: اسم تفضیل یا نقاشی طبیعت">


<label>نوع فعالیت:</label>

<select id="type">

<option>طرح درس</option>
<option>سؤال امتحانی</option>
<option>فعالیت گروهی</option>
<option>ایده خلاقانه</option>

</select>


<button onclick="createIdea()">
ساخت پیشنهاد آموزشی
</button>

<button onclick="copyResult()">
کپی نتیجه
</button>
<div class="result" id="result">
نتیجه اینجا نمایش داده می‌شود.
</div>


</div>


<script>

function createIdea(){

let lesson =
document.getElementById("lesson").value;

let grade =
document.getElementById("grade").value;

let topic =
document.getElementById("topic").value;

let type =
document.getElementById("type").value;


if(topic==""){
document.getElementById("result").innerText =
"لطفاً موضوع درس را وارد کنید.";
return;
}


let text = "";


if(lesson=="عربی"){

text =
`برای درس عربی پایه ${grade} درباره «${topic}» یک ${type} طراحی کن. 
از مثال‌های ساده، فعالیت کلاسی و مشارکت دانش‌آموزان استفاده شود.`;

}

else {

text =
`برای درس هنر پایه ${grade} درباره «${topic}» یک ${type} طراحی کن.
ایده باید خلاقانه و قابل اجرا در کلاس باشد.`;

}


document.getElementById("result").innerText=text;

}
function copyResult(){

let text = document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("نتیجه کپی شد ✅");

}
</script>


</body>
</html>
