<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دستیار معلم هوش مصنوعی</title>

    <style>
        body {
            font-family: Tahoma, Arial;
            background: #f2f2f2;
            margin: 0;
            padding: 20px;
        }

        .box {
            background: white;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1e8449;
        }

        .output {
            margin-top: 15px;
            padding: 10px;
            background: #ecf9f1;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>دستیار هوشمند معلم</h1>

    <p>برای معلمان عربی و هنر - تولید ایده تدریس با یک کلیک</p>

    <button onclick="generateIdea()">
        تولید ایده تدریس
    </button>

    <div class="output" id="result"></div>

</div>

<script>
    const ideas = [
        "از دانش‌آموزان بخواه یک گفت‌وگوی کوتاه عربی درباره خرید در بازار بنویسند.",
        "دانش‌آموزان یک پوستر هنری درباره موضوع 'صلح' طراحی کنند.",
        "یک داستان کوتاه عربی با ۵ جمله ساده بنویسند.",
        "در کلاس هنر، از دانش‌آموزان بخواه یک اثر با خطاطی اسم خودشان بسازند.",
        "فعالیت گروهی: طراحی یک مکالمه عربی در رستوران."
    ];

    function generateIdea() {
        let random = Math.floor(Math.random() * ideas.length);
        document.getElementById("result").innerText = ideas[random];
    }
</script>

</body>
</html>
